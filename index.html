<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BountyTriage | Security Dashboard</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; line-height: 1.6; color: #c9d1d9; background-color: #0d1117; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: #161b22; padding: 30px; border-radius: 10px; border: 1px solid #30363d; }
        h1 { color: #58a6ff; border-bottom: 1px solid #30363d; padding-bottom: 10px; }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        select, input, textarea { width: 100%; padding: 10px; background: #0d1117; border: 1px solid #30363d; color: white; border-radius: 5px; box-sizing: border-box; }
        button { background-color: #238636; color: white; border: none; padding: 12px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 16px; }
        button:hover { background-color: #2ea043; }
        #result { margin-top: 20px; padding: 15px; border-radius: 5px; display: none; }
        .critical { border-left: 5px solid #da3633; background: #2d1616; }
        .high { border-left: 5px solid #f85149; background: #261a1a; }
        .medium { border-left: 5px solid #d29922; background: #221e14; }
    </style>
</head>
<body>
    <div class="container">
        <h1>BountyTriage</h1>
        <p>Prioritize security vulnerabilities based on impact and ease of exploit.</p>
        
        <div class="input-group">
            <label>Vulnerability Type</label>
            <input type="text" id="vulnType" placeholder="e.g. SQL Injection, XSS, IDOR">
        </div>

        <div class="input-group">
            <label>Impact Level</label>
            <select id="impact">
                <option value="3">Critical (Full System/Data Access)</option>
                <option value="2">High (Sensitive Info Leak)</option>
                <option value="1">Medium (Limited Impact)</option>
            </select>
        </div>

        <button onclick="triage()">Calculate Priority</button>

        <div id="result"></div>
    </div>

    <script>
        function triage() {
            const type = document.getElementById('vulnType').value || "Unknown Issue";
            const impact = document.getElementById('impact').value;
            const res = document.getElementById('result');
            
            res.style.display = 'block';
            let priority = impact == 3 ? 'CRITICAL' : (impact == 2 ? 'HIGH' : 'MEDIUM');
            res.className = priority.toLowerCase();
            
            res.innerHTML = `<strong>Priority: ${priority}</strong><br>Report generated for: ${type}<br>Next Step: Verify Proof of Concept (PoC).`;
        }
    </script>
</body>
</html>
