<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BountyTriage Pro | AI Validator & CVSS</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0d1117; color: #c9d1d9; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: #161b22; padding: 30px; border-radius: 12px; border: 1px solid #30363d; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { color: #58a6ff; border-bottom: 2px solid #30363d; padding-bottom: 10px; display: flex; justify-content: space-between; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #8b949e; }
        input, select, textarea { width: 100%; padding: 12px; background: #0d1117; border: 1px solid #30363d; color: white; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        textarea { height: 120px; resize: vertical; }
        button { background-color: #238636; color: white; border: none; padding: 15px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 20px; transition: 0.3s; }
        button:hover { background-color: #2ea043; }
        .panel { padding: 20px; border-radius: 8px; margin-top: 20px; display: none; }
        .success { background: #1b2a1e; border: 1px solid #238636; }
        .warning { background: #2a2113; border: 1px solid #d29922; }
        .score-badge { font-size: 24px; font-weight: bold; color: #58a6ff; }
        .draft-box { background: #0d1117; padding: 10px; border-radius: 4px; border: 1px dashed #444; margin-top: 10px; white-space: pre-wrap; font-family: monospace; font-size: 13px; }
    </style>
</head>
<body>

<div class="container">
    <h1>BountyTriage Pro <span>v2.0</span></h1>
    
    <div class="grid">
        <div>
            <label>Vulnerability Type</label>
            <input type="text" id="vulnType" placeholder="e.g., IDOR, SQLi, XSS">
        </div>
        <div>
            <label>Attack Vector (AV)</label>
            <select id="av">
                <option value="0.85">Network (Remote)</option>
                <option value="0.62">Adjacent</option>
                <option value="0.55">Local</option>
                <option value="0.2">Physical</option>
            </select>
        </div>
    </div>

    <div style="margin-top: 20px;">
        <label>Full Vulnerability Report / Description</label>
        <textarea id="reportText" placeholder="Paste the researcher's report here (Steps to reproduce, Impact, etc.)"></textarea>
    </div>

    <button onclick="analyzeReport()">Analyze & Calculate CVSS</button>

    <!-- Analysis Result Panel -->
    <div id="resultPanel" class="panel">
        <h3 id="statusHeader">Analysis Complete</h3>
        <div id="cvssResult">
            CVSS Base Score: <span class="score-badge" id="scoreValue">0.0</span>
        </div>
        <div id="feedbackText" style="margin-top: 15px;"></div>
        <div id="draftSection" style="display:none;">
            <label style="margin-top:15px; display:block;">Recommended Report Draft:</label>
            <div class="draft-box" id="reportDraft"></div>
        </div>
    </div>
</div>

<script>
function analyzeReport() {
    const type = document.getElementById('vulnType').value;
    const report = document.getElementById('reportText').value;
    const av = parseFloat(document.getElementById('av').value);
    const panel = document.getElementById('resultPanel');
    const feedback = document.getElementById('feedbackText');
    const scoreVal = document.getElementById('scoreValue');
    const draftBox = document.getElementById('reportDraft');
    const draftSection = document.getElementById('draftSection');

    panel.style.display = 'block';

    // 1. SIMPLE CVSS LOGIC (Mockup of Base Score formula)
    let baseScore = (av * 10).toFixed(1);
    scoreVal.innerText = baseScore;

    // 2. ANALYSIS LOGIC (Checking for "Proof of Concept" or "Steps")
    const hasSteps = report.toLowerCase().includes("step");
    const hasImpact = report.toLowerCase().includes("impact");
    const hasPOC = report.toLowerCase().includes("http") || report.toLowerCase().includes("poc");

    if (report.length < 50 || !hasSteps || !hasPOC) {
        // REPORT IS WEAK
        panel.className = "panel warning";
        document.getElementById('statusHeader').innerText = "⚠️ Incomplete Report Detected";
        feedback.innerHTML = "The researcher failed to provide clear Steps to Reproduce or a valid PoC.";
        
        draftSection.style.display = 'block';
        draftBox.innerText = `Subject: [VULN] ${type} Found in Application\n\nSummary:\nI discovered a ${type} vulnerability...\n\nSteps to Reproduce:\n1. Navigate to [Target URL]\n2. Capture request with Burp Suite\n3. Modify [Parameter] to [Payload]\n4. Observe unauthorized data access.\n\nImpact:\nAllows an attacker to access sensitive user data.`;
    } else {
        // REPORT IS GOOD
        panel.className = "panel success";
        document.getElementById('statusHeader').innerText = "✅ High Quality Report";
        feedback.innerHTML = "The report contains technical details and reproduction steps. CVSS calculated based on network vector.";
        draftSection.style.display = 'none';
    }
}
</script>

</body>
</html>
